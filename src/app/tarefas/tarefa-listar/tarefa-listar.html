<h1>Tarefas</h1>

<span>
    Qtd tarefas:
    <span class="quantidade">{{ tarefas().length }}</span>
</span>

<table>
    <thead>
        <tr>
            <th>Descrição</th>
            <th>Prioridade</th>
            <th>Horas estimadas</th>
            <th></th>
        </tr>
    </thead>

    <tbody>

        @for(tarefa of tarefas(); track tarefa.id){

            <tr>
                <td>{{ tarefa.descricao }}</td>
                <td>{{ tarefa.prioridade }}</td>
                <td>{{ tarefa.horasEstimadas }} min</td>

                <td>
                    <a
                        class="editar"
                        routerLink="/tarefas/editar/{{ tarefa.id }}">
                        Editar
                    </a>

                    <button class="apagar">
                        Apagar
                    </button>
                </td>
            </tr>

        }

    </tbody>
</table>

<span>
    Total estimado:
    <span class="total">
        {{ totalMinutos() }} min
    </span>
</span>
